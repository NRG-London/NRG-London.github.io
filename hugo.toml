baseURL = "https://neilgarratt.com/"
locale = "en-GB"
title = "Neil Garratt"
paginate = 12

[params]
  description = "Neil Garratt, Conservative London Assembly Member for Croydon & Sutton. Chair of the Budget & Performance Committee."
  author = "Neil Garratt"
  email = "London@NeilGarratt.com"
  substackURL = "https://neilgarratt.substack.com"
  substackRSS = "https://neilgarratt.substack.com/feed"
  imprint = "Promoted by Neil Garratt, Donnington House, 2a Sutton Court Road, Sutton, SM1 4SY."
  goatcounterURL = "https://neilgarratt.goatcounter.com/count"

  [params.social]
    twitter = "https://twitter.com/NeilGarratt"
    youtube = ""
    substack = "https://neilgarratt.substack.com"
    linkedin = ""

[taxonomies]
  category = "categories"
  campaign = "campaigns"

# Re-fetch remote resources (the Substack RSS) at most every 10 min locally,
# so a long-running `hugo server` doesn't serve a stale feed. No effect on CI,
# which builds on a fresh runner with an empty cache.
[caches]
  [caches.getresource]
    maxAge = "10m"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML"]

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    name = "Campaigns"
    url = "/campaigns/"
    weight = 2
  [[menu.main]]
    name = "Recent Activity"
    url = "/activity/"
    weight = 3
  [[menu.main]]
    name = "Newsletter"
    url = "/#newsletter"
    weight = 4
