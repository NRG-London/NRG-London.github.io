<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>London crime skylines</title>
<style>
  @font-face {
    font-family: 'Libre Baskerville';
    src: url(/fonts/LibreBaskerville.ttf) format('truetype');
    font-weight: 400 700; font-style: normal; font-display: block;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url(/fonts/DMSans.ttf) format('truetype');
    font-weight: 300 700; font-style: normal; font-display: block;
  }

  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { background: #1A2332; font-family: 'DM Sans', sans-serif; }
  #map { position: absolute; inset: 0; }
  #map canvas { outline: none; }

  /* --- brand overlay card --- */
  .card {
    position: absolute; top: 22px; left: 24px; z-index: 10;
    max-width: min(460px, calc(100vw - 48px));
    pointer-events: none; color: #F3F6F4;
  }
  .card .eyebrow {
    display: block; font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: #5A9FD4; margin-bottom: 6px;
  }
  .card .eyebrow::after {
    content: ""; display: block; width: 34px; height: 3px;
    background: #5A9FD4; margin-top: 6px;
  }
  .card h1 {
    font-family: 'Libre Baskerville', serif; font-weight: 700;
    font-size: clamp(19px, 3.4vw, 27px); line-height: 1.22; margin: 10px 0 8px;
    transition: opacity 0.22s ease;
  }
  .card .subtitle {
    font-size: clamp(12.5px, 2vw, 14.5px); line-height: 1.45;
    color: #B9C2CE; margin: 0;
    transition: opacity 0.22s ease;
  }

  /* --- controls: year row (modifier) above the metric switcher (primary) --- */
  .controls {
    position: absolute; left: 24px; bottom: 44px; z-index: 30;
    display: flex; flex-direction: column; gap: 8px;
    max-width: calc(100vw - 48px);
  }
  .switcher, .yearbar { display: flex; flex-wrap: wrap; gap: 8px; }
  .yearbar button {
    font: 600 11.5px 'DM Sans', sans-serif; color: #8A9490;
    background: transparent; border: 1px solid #3B4A5E;
    border-radius: 999px; padding: 5px 11px; cursor: pointer;
  }
  .yearbar button:hover { color: #F3F6F4; }
  .yearbar button.active {
    color: #F3F6F4; border-color: #5A9FD4; background: rgba(24, 119, 184, 0.35);
  }
  .yearbar button:disabled {
    opacity: 0.35; cursor: default; color: #8A9490;
  }
  .switcher button {
    font: 600 12.5px 'DM Sans', sans-serif; color: #B9C2CE;
    background: rgba(36, 49, 66, 0.85); border: 1px solid #3B4A5E;
    border-radius: 999px; padding: 8px 15px; cursor: pointer;
  }
  .switcher button:hover { color: #F3F6F4; background: #34455C; }
  .switcher button.active {
    color: #1A2332; background: #E0A24E; border-color: #E0A24E;
  }

  .foot {
    position: absolute; left: 24px; right: 24px; bottom: 16px; z-index: 10;
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px; pointer-events: none;
    font-size: 11.5px; color: #8A9490;
  }
  .foot .source { font-style: italic; }
  .foot .tag { font-weight: 700; letter-spacing: 0.08em; white-space: nowrap; }

  .hint {
    position: absolute; right: 24px; top: 22px; z-index: 10;
    font-size: 11.5px; color: #8A9490; text-align: right; pointer-events: none;
  }
  #reset {
    position: absolute; right: 24px; bottom: 44px; z-index: 10;
    font: 600 12px 'DM Sans', sans-serif; color: #F3F6F4;
    background: rgba(36, 49, 66, 0.85); border: 1px solid #3B4A5E;
    border-radius: 6px; padding: 7px 12px; cursor: pointer; display: none;
  }
  #reset:hover { background: #34455C; }

  /* --- click-to-activate shield (embed variant); switcher sits above it --- */
  #shield {
    position: absolute; inset: 0; z-index: 20; cursor: pointer;
    display: flex; align-items: flex-end; justify-content: center;
    background: transparent;
  }
  #shield span {
    margin-bottom: 84px; font: 600 13px 'DM Sans', sans-serif;
    color: #F3F6F4; background: rgba(36, 49, 66, 0.9);
    border: 1px solid #3B4A5E; border-radius: 999px; padding: 9px 18px;
  }

  .tooltip-name { font-weight: 700; font-size: 13px; }
  .tooltip-borough { color: #B9C2CE; font-size: 11.5px; margin-bottom: 3px; }
  .tooltip-n { font-size: 12.5px; }
  .tooltip-n b { color: #E0A24E; }
</style>
</head>

  function metricByKey(k) {
    for (var i = 0; i < CFG.metrics.length; i++)
      if (CFG.metrics[i].key === k) return CFG.metrics[i];
    return CFG.metrics[0];
  }
  // current selection: metric key + year option ("2021".."2025" | "all")
  var current = { metric: CFG.initial, year: CFG.initialYear };
  function mode() { return current.year === "all" ? "all" : "yearly"; }

  // per-ward count for the current selection, from the yearly-count arrays
  // (null slots = source not running that year; "all" spans the true period)
  function countFor(p, m) {
    var a = p[m.prop];
    if (current.year === "all") {
      var s = 0;
      for (var i = 0; i < a.length; i++) if (a[i] !== null) s += a[i];
      return s;
    }
    return a[CFG.yearsAxis.indexOf(+current.year)] || 0;
  }

  // ---- colour ramp: brand hexes, gamma-compressed on colour only ----
  function hexToRgb(h) {
    h = h.replace("#", "");
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }
  var RAMP = CFG.ramp.map(hexToRgb);
  function colorFor(n, maxN) {
    var t = Math.pow(Math.max(0, Math.min(n / maxN, 1)), CFG.colorGamma);
    var x = t * (RAMP.length - 1);
    var i = Math.min(Math.floor(x), RAMP.length - 2);
    var f = x - i;
    var a = RAMP[i], b = RAMP[i + 1];
    return [
      Math.round(a[0] + (b[0] - a[0]) * f),
      Math.round(a[1] + (b[1] - a[1]) * f),
      Math.round(a[2] + (b[2] - a[2]) * f),
      255
    ];
  }

  var lighting = new deck.LightingEffect({
    ambient: new deck.AmbientLight({ color: [255, 255, 255], intensity: 1.05 }),
    sun: new deck.DirectionalLight({ color: [255, 250, 240], intensity: 1.3, direction: [-2, -4, -1.2] })
  });

  var reducedMotion = window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var TRANSITION = reducedMotion ? 0 : 750;
  function easeCubicInOut(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function isNodata(m, p) { return m.cityNodata && p.city; }

  // per-view height scale is baked into the elevation values (deck.gl animates
  // attributes, not uniforms — a scale change would jump). Single years share
  // one scale per metric (honest year-to-year trends); "All" has its own.
  function wardLayer() {
    var m = metricByKey(current.metric);
    var md = mode();
    var scale = m.scale[md], maxN = m.maxN[md];
    var viewKey = current.metric + "|" + current.year;
    return new deck.GeoJsonLayer({
      id: "wards",
      data: WARDS,
      extruded: true,
      wireframe: false,
      pickable: true,
      stroked: false,
      getElevation: function (f) {
        return isNodata(m, f.properties) ? 0 : countFor(f.properties, m) * scale;
      },
      getFillColor: function (f) {
        return isNodata(m, f.properties) ? CFG.nodataColor : colorFor(countFor(f.properties, m), maxN);
      },
      updateTriggers: { getElevation: viewKey, getFillColor: viewKey },
      transitions: {
        getElevation: { duration: TRANSITION, easing: easeCubicInOut },
        getFillColor: { duration: TRANSITION, easing: easeCubicInOut }
      },
      material: { ambient: 0.5, diffuse: 0.65, shininess: 26, specularColor: [70, 85, 105] }
    });
  }

  var boroughLayer = new deck.GeoJsonLayer({
    id: "boroughs",
    data: BOROUGHS,
    filled: false,
    stroked: true,
    getLineColor: [138, 148, 144, 110],
    lineWidthMinPixels: 1
  });

  function tooltip(info) {
    var o = info.object;
    if (!o) return null;
    var p = o.properties;
    var m = metricByKey(current.metric);
    var body = isNodata(m, p)
      ? '<div class="tooltip-name">' + p.name + '</div>'
        + '<div class="tooltip-borough">City of London &mdash; not covered by this data</div>'
      : '<div class="tooltip-name">' + p.name + '</div>'
        + (p.borough !== p.name ? '<div class="tooltip-borough">' + p.borough + '</div>' : '')
        + '<div class="tooltip-n"><b>' + countFor(p, m).toLocaleString("en-GB") + '</b> '
        + m.tooltipNoun + '</div>';
    return {
      html: body,
      style: {
        background: "rgba(36,49,66,0.94)", color: "#F3F6F4",
        border: "1px solid #3B4A5E", borderRadius: "6px",
        padding: "8px 11px", fontFamily: "'DM Sans', sans-serif", fontSize: "12px"
      }
    };
  }
  // fit the same ground span at narrower viewports (deck zoom is log2-scaled)
  var zoomAdj = Math.min(0, Math.log2(window.innerWidth / CFG.baseWidth));
  var CAMERA = Object.assign({}, CFG.camera, { zoom: CFG.camera.zoom + zoomAdj });

  var framed = false;
  var deckgl = new deck.DeckGL({
    container: "map",
    initialViewState: CAMERA,
    controller: { dragMode: "rotate", touchRotate: true, inertia: 250 },
    layers: [wardLayer(), boroughLayer],
    effects: [lighting],
    getTooltip: tooltip,
    onAfterRender: function () {
      if (!framed) { framed = true; checkDone(); }
    }
  });

  // ---- metric + year switching ----
  var titleEl = document.getElementById("title");
  var subEl = document.getElementById("subtitle");
  var srcEl = document.getElementById("source");
  var switcher = document.getElementById("switcher");
  var yearbar = document.getElementById("yearbar");

  function setText(m) {
    var cap = m.captions[current.year];
    titleEl.textContent = cap.title;
    subEl.textContent = cap.subtitle;
    srcEl.textContent = m.source;
  }

  function refresh() {
    var m = metricByKey(current.metric);
    deckgl.setProps({ layers: [wardLayer(), boroughLayer] });
    titleEl.style.opacity = subEl.style.opacity = 0;
    setTimeout(function () {
      setText(m);
      titleEl.style.opacity = subEl.style.opacity = 1;
    }, reducedMotion ? 0 : 220);
    var btns = switcher.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++)
      btns[i].classList.toggle("active", btns[i].dataset.key === current.metric);
    var ybtns = yearbar.querySelectorAll("button");
    for (var j = 0; j < ybtns.length; j++) {
      var y = ybtns[j].dataset.year;
      ybtns[j].disabled = y !== "all" && m.years.indexOf(y) === -1;
      ybtns[j].classList.toggle("active", y === current.year);
      ybtns[j].title = ybtns[j].disabled ? "No ward-level data for " + y : "";
    }
  }

  function setMetric(key) {
    if (key === current.metric) return;
    current.metric = key;
    var m = metricByKey(key);
    // selected year not covered by this source -> fall back to the full period
    if (current.year !== "all" && m.years.indexOf(current.year) === -1)
      current.year = "all";
    refresh();
  }

  function setYear(y) {
    if (y === current.year) return;
    var m = metricByKey(current.metric);
    if (y !== "all" && m.years.indexOf(y) === -1) return;   // disabled year: no-op
    current.year = y;
    refresh();
  }
  window.__setMetric = setMetric;   // used by the capture/test driver
  window.__setYear = setYear;

  CFG.metrics.forEach(function (m) {
    var b = document.createElement("button");
    b.textContent = m.label;
    b.dataset.key = m.key;
    if (m.key === current.metric) b.classList.add("active");
    b.addEventListener("click", function () { setMetric(m.key); });
    switcher.appendChild(b);
  });
  CFG.yearsAxis.map(String).concat(["all"]).forEach(function (y) {
    var b = document.createElement("button");
    b.textContent = y === "all" ? "All" : y;
    b.dataset.year = y;
    b.addEventListener("click", function () { setYear(y); });
    yearbar.appendChild(b);
  });
  setText(metricByKey(current.metric));
  refresh();

  // right-drag pans, so releasing must not pop the browser context menu
  document.getElementById("map").addEventListener("contextmenu", function (e) {
    e.preventDefault();
  });

  // reset view (appears once the user has interacted)
  var resetBtn = document.getElementById("reset");
  var nudge = 0;
  document.getElementById("map").addEventListener("pointerdown", function () {
    resetBtn.style.display = "block";
  });
  resetBtn.addEventListener("click", function () {
    nudge += 1e-6; // new object + epsilon so the controller accepts the reset
    deckgl.setProps({
      initialViewState: Object.assign({}, CAMERA, {
        bearing: CAMERA.bearing + nudge,
        transitionDuration: 900
      })
    });
  });

  // click-to-activate shield for iframe embeds; the switcher sits above it so
  // datasets can be flipped without engaging the 3D controls
  if (CFG.shield) {
    var shield = document.getElementById("shield");
    var mapEl = document.getElementById("map");
    mapEl.style.pointerEvents = "none";
    shield.style.display = "flex";
    shield.addEventListener("click", function () {
      shield.style.display = "none";
      mapEl.style.pointerEvents = "auto";
    });
  }

  // ---- completion gate for the headless screenshot driver ----
  var fontsReady = false;
  function checkDone() {
    if (fontsReady && framed) {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { window.__NG_DONE__ = true; });
      });
    }
  }
  Promise.all([
    document.fonts.load("700 16px 'Libre Baskerville'"),
    document.fonts.load("400 16px 'DM Sans'"),
    document.fonts.load("600 16px 'DM Sans'"),
    document.fonts.load("700 16px 'DM Sans'")
  ]).then(function () { return document.fonts.ready; })
    .then(function () { fontsReady = true; checkDone(); })
    .catch(function (err) { window.__NG_ERROR__ = "font load failed: " + String(err); });
  </script>
</body>
</html>
