<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="section-header">
      <h2>About</h2>
    </div>
    <div class="bio-layout">
      <div class="bio-text">
        {{ .Content }}
      </div>
      <div class="bio-sidebar">
        <h4>At a Glance</h4>
        <ul>
          {{ range .Params.sidebar_facts }}
          <li>{{ . }}</li>
          {{ end }}
        </ul>
        <div class="party-badge">
          <img class="tree-logo" src="/images/conservative-tree.png" alt="">
          <span class="party-badge-text">Conservative Party</span>
        </div>
      </div>
    </div>
  </div>
</section>
