<!-- CAMPAIGNS -->
<section id="campaigns">
  <div class="container">
    <div class="section-header">
      <h2>Current Campaigns</h2>
      <a href="/campaigns/" class="view-all">View all &rarr;</a>
    </div>
    <div class="campaigns-grid">
      {{ with site.GetPage "/campaigns" }}
        {{ range first 3 .Pages.ByWeight }}
          {{ partial "campaign-card.html" . }}
        {{ end }}
      {{ end }}
    </div>
  </div>
</section>
