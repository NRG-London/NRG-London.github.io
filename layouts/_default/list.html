{{ define "main" }}

<div class="archive-header">
  <h1>{{ .Title }}</h1>
</div>

<div class="archive-content">
  {{ range .RegularPages }}
  <a href="{{ .Permalink }}" class="post-item">
    <div class="post-date">{{ .Date.Format "January 2006" }}</div>
    <div class="post-title">{{ .Title }}</div>
  </a>
  {{ end }}
</div>

{{ end }}
